name: Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Android debug build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install native audio toolchain
        run: sdkmanager "ndk;27.0.12077973" "cmake;3.22.1" > /dev/null
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
      - name: Build debug APK
        shell: bash
        run: |
          set +e
          gradle :android:app:assembleDebug --stacktrace > android-build.log 2>&1
          result=$?
          tail -n 80 android-build.log
          exit $result
      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: osr-android-build-log
          path: android-build.log
          if-no-files-found: ignore
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: osr-android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
