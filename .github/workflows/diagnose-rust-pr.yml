name: Diagnose Rust PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  diagnose-macos:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install Rust and Clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Capture filtered Clippy diagnostics
        shell: bash
        run: |
          set +e
          cargo clippy --workspace --all-targets --all-features --message-format=short 2>&1 \
            | sed $'s/\033\[[0-9;]*m//g' \
            | grep -E '(^error|^warning|\.rs:|could not compile)' \
            > clippy-errors.txt
          exit 0

      - name: Commit diagnostic log
        shell: bash
        run: |
          if git diff --quiet -- clippy-errors.txt && git ls-files --error-unmatch clippy-errors.txt >/dev/null 2>&1; then
            echo "Diagnostic log is unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clippy-errors.txt
          git commit -m "chore: capture macOS Clippy diagnostics"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
