name: Android Preview Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/release.yml'
      - 'android/**'

permissions:
  contents: write

concurrency:
  group: android-preview-release
  cancel-in-progress: true

env:
  RELEASE_TAG: android-preview-2026-07-11
  RELEASE_NAME: OpenSoundRelay Android Preview

jobs:
  android:
    name: Build and publish Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install native audio toolchain
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'ndk;27.2.12479018' 'cmake;3.22.1' 'build-tools;35.0.0'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
      - name: Set monotonically increasing Android version
        run: echo "OSR_VERSION_CODE=$((400000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
      - name: Build Android preview APK
        run: gradle :android:app:assembleDebug
      - name: Sign with stable public preview key
        run: |
          curl -fsSL 'https://android.googlesource.com/platform/build/+/refs/heads/main/target/product/security/testkey.pk8?format=TEXT' | base64 --decode > testkey.pk8
          curl -fsSL 'https://android.googlesource.com/platform/build/+/refs/heads/main/target/product/security/testkey.x509.pem?format=TEXT' | base64 --decode > testkey.x509.pem
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" sign \
            --key testkey.pk8 \
            --cert testkey.x509.pem \
            --out OpenSoundRelay-android-preview.apk \
            android/app/build/outputs/apk/debug/app-debug.apk
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose OpenSoundRelay-android-preview.apk
      - name: Prepare release checksum
        run: sha256sum OpenSoundRelay-android-preview.apk > OpenSoundRelay-android-preview.apk.sha256
      - name: Create or update Android preview release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              OpenSoundRelay-android-preview.apk \
              OpenSoundRelay-android-preview.apk.sha256 \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              OpenSoundRelay-android-preview.apk \
              OpenSoundRelay-android-preview.apk.sha256 \
              --target "${GITHUB_SHA}" \
              --title "$RELEASE_NAME" \
              --prerelease \
              --notes $'Android-only preview build.\n\nIncludes 5 ms Opus, AAudio low-latency playback, 8–512 kbps bitrate control, LAN discovery, native-volume sync, and the three-tab UI.\n\nThis preview uses the public AOSP test key so future preview APKs can be installed as updates. The first transition from older randomly signed debug builds requires uninstalling the old app once. Do not treat this preview signing key as production security.\n\nDesktop builds are intentionally withheld until their implementation and debugging are complete.'
          fi
